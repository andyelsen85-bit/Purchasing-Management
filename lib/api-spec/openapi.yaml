openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Purchasing Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: departments
  - name: companies
  - name: workflows
  - name: documents
  - name: notes
  - name: history
  - name: dashboard
  - name: gt-invest
  - name: audit
  - name: settings
  - name: admin
  - name: notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ---------------- AUTH ----------------
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login (local or LDAP fallback)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }
        "401":
          description: Bad credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "204": { description: Logged out }
  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Get current session user
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionResponse" }
  /auth/negotiate:
    get:
      operationId: kerberosNegotiate
      tags: [auth]
      summary: Kerberos / SPNEGO single-sign-on handshake
      description: |
        Browsers send the user's Kerberos ticket via the
        `Authorization: Negotiate <base64-token>` header. When no header
        is present we reply with `401 WWW-Authenticate: Negotiate` to
        trigger the browser's automatic retry. When a token is present
        and the server has been provisioned with a keytab + SPN, we step
        through SPNEGO and create/upgrade the matching local user.
      parameters:
        - name: Authorization
          in: header
          required: false
          schema: { type: string }
          description: Negotiate token from the browser, base64-encoded.
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }
        "401":
          description: Negotiate handshake required or token rejected.
          headers:
            WWW-Authenticate:
              schema: { type: string }
              description: Always `Negotiate`, optionally followed by the next token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "501":
          description: Kerberos backend not configured on this server.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  # ---------------- USERS ----------------
  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
  /users/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    patch:
      operationId: updateUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    delete:
      operationId: deleteUser
      tags: [users]
      responses:
        "204": { description: Deleted }

  # ---------------- DEPARTMENTS ----------------
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Department" }
    post:
      operationId: createDepartment
      tags: [departments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDepartmentInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Department" }
  /departments/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    patch:
      operationId: updateDepartment
      tags: [departments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDepartmentInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Department" }
    delete:
      operationId: deleteDepartment
      tags: [departments]
      responses:
        "204": { description: Deleted }

  # ---------------- COMPANIES ----------------
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      responses:
        "200":
          description: Companies
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Company" }
    post:
      operationId: createCompany
      tags: [companies]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCompanyInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Company" }
  /companies/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: getCompany
      tags: [companies]
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompanyWithContacts" }
    patch:
      operationId: updateCompany
      tags: [companies]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCompanyInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Company" }
    delete:
      operationId: deleteCompany
      tags: [companies]
      responses:
        "204": { description: Deleted }
  /companies/{id}/contacts:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    post:
      operationId: createContact
      tags: [companies]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateContactInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
  /contacts/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    patch:
      operationId: updateContact
      tags: [companies]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateContactInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
    delete:
      operationId: deleteContact
      tags: [companies]
      responses:
        "204": { description: Deleted }

  # ---------------- WORKFLOWS ----------------
  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      parameters:
        - { name: departmentId, in: query, required: false, schema: { type: integer } }
        - { name: step, in: query, required: false, schema: { $ref: "#/components/schemas/WorkflowStep" } }
        - { name: q, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Workflows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkflowSummary" }
    post:
      operationId: createWorkflow
      tags: [workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWorkflowInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
  /workflows/by-step:
    get:
      operationId: listWorkflowsByStep
      tags: [workflows]
      parameters:
        - name: departmentId
          in: query
          required: false
          schema: { type: integer }
          description: Limit the kanban to a single department.
      responses:
        "200":
          description: Grouped by step
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkflowsByStepGroup" }
  /workflows/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: getWorkflow
      tags: [workflows]
      responses:
        "200":
          description: Workflow
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
    patch:
      operationId: updateWorkflow
      tags: [workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWorkflowInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
    delete:
      operationId: deleteWorkflow
      tags: [workflows]
      summary: Soft-delete a workflow (admin only)
      description: |
        Marks the workflow as deleted by setting `deletedAt` instead of
        physically removing the row. Soft-deleted workflows are hidden
        from every list, dashboard, and export, but can be restored
        from Settings → Trash by an admin.
      responses:
        "204": { description: Soft-deleted }
  /workflows/{id}/restore:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    post:
      operationId: restoreWorkflow
      tags: [workflows]
      summary: Restore a soft-deleted workflow (admin only)
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
  /workflows/{id}/advance:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    post:
      operationId: advanceWorkflow
      tags: [workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdvanceWorkflowInput" }
      responses:
        "200":
          description: Advanced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
  /workflows/{id}/reject:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    post:
      operationId: rejectWorkflow
      tags: [workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RejectWorkflowInput" }
      responses:
        "200":
          description: Rejected and closed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
  /workflows/{id}/undo:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    post:
      operationId: undoWorkflow
      tags: [workflows]
      responses:
        "200":
          description: Reverted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
  /workflows/{id}/gt-invest-decision:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    post:
      operationId: setGtInvestDecision
      tags: [workflows]
      summary: Record the GT Invest committee decision and apply transition
      description: |
        Records the committee's decision on a workflow currently sitting
        on the GT_INVEST step and applies the matching transition:
        OK → ORDERING; REFUSED → REJECTED (closed);
        POSTPONED / ACCORD_PRINCIPE → stays on GT_INVEST and
        re-assigns the workflow to the supplied meeting `dateId`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GtInvestDecisionInput" }
      responses:
        "200":
          description: Decision applied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }

  # ---------------- DOCUMENTS ----------------
  /workflows/{id}/documents:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: listWorkflowDocuments
      tags: [documents]
      responses:
        "200":
          description: Docs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Document" }
    post:
      operationId: uploadWorkflowDocument
      tags: [documents]
      description: |
        Upload a new revision of a document. Two transports are accepted:

          * `application/json` with a base64 payload — convenient for
            programmatic clients and the codegen-driven React form.
          * `multipart/form-data` with a `file` part plus `step` and
            `kind` text fields — the standard browser file-input path.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadDocumentInput" }
          multipart/form-data:
            schema:
              type: object
              required: [file, step, kind]
              properties:
                file:
                  type: string
                  format: binary
                step: { type: string }
                kind: { type: string }
      responses:
        "201":
          description: Uploaded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
  /documents/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    delete:
      operationId: deleteDocument
      tags: [documents]
      responses:
        "204": { description: Deleted }

  # ---------------- NOTES ----------------
  /workflows/{id}/notes:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: listWorkflowNotes
      tags: [notes]
      responses:
        "200":
          description: Notes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Note" }
    post:
      operationId: createWorkflowNote
      tags: [notes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateNoteInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }

  # ---------------- HISTORY ----------------
  /workflows/{id}/history:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: listWorkflowHistory
      tags: [history]
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HistoryEntry" }

  # ---------------- DASHBOARD ----------------
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  # ---------------- GT-INVEST ----------------
  /gt-invest/workflows:
    get:
      operationId: listGtInvestWorkflows
      tags: [gt-invest]
      responses:
        "200":
          description: GT Invest workflows ready for the next preparation
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkflowSummary" }
  /gt-invest/export:
    get:
      operationId: exportGtInvestPackage
      tags: [gt-invest]
      summary: Merged GT Invest preparation package
      description: |
        Returns a single PDF concatenating the cover sheet plus every
        attached document (quotes, manager validation, financial
        validation) for the workflows queued for the next GT Invest
        preparation date.
      parameters:
        - name: dateId
          in: query
          required: false
          schema: { type: integer }
          description: GT Invest preparation date to package; defaults to next.
      responses:
        "200":
          description: Merged PDF
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /workflows/{id}/export-pdf:
    get:
      operationId: exportWorkflowPdf
      tags: [workflows]
      summary: Merged PDF of every attachment for one workflow
      description: |
        Returns a single PDF concatenating a cover sheet plus every
        current attachment for the given workflow, ordered through the
        purchasing lifecycle:
        QUOTE → GT_INVEST_WINNER → ORDER → DELIVERY → INVOICE → OTHER.
        Non-PDF attachments are represented by a separator page so
        reviewers can see what's missing. Used by the Validate Invoice
        screen to produce a single signing pack.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Merged PDF
          content:
            application/pdf:
              schema: { type: string, format: binary }

  # ---------------- WORKFLOW EXPORT ----------------
  /workflows/export:
    get:
      operationId: exportWorkflows
      tags: [workflows]
      summary: Export workflows as Excel or CSV
      parameters:
        - name: format
          in: query
          required: true
          schema: { type: string, enum: [xlsx, csv] }
        - name: departmentId
          in: query
          required: false
          schema: { type: integer }
        - name: step
          in: query
          required: false
          schema: { type: string }
        - name: from
          in: query
          required: false
          schema: { type: string, format: date }
        - name: to
          in: query
          required: false
          schema: { type: string, format: date }
      responses:
        "200":
          description: Spreadsheet
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
            text/csv:
              schema: { type: string }

  # ---------------- NOTIFICATIONS ----------------
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List recent notification fan-outs (admin)
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 100 }
        - name: workflowId
          in: query
          required: false
          schema: { type: integer }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [PENDING, SENT, FAILED] }
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NotificationEntry" }

  # ---------------- AUDIT (admin only) ----------------
  /audit-log:
    get:
      operationId: listAuditLog
      tags: [audit]
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditEntry" }

  # ---------------- SETTINGS ----------------
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppSettings" }
    patch:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSettingsInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppSettings" }
  /settings/gt-invest-dates:
    get:
      operationId: listGtInvestDates
      tags: [settings]
      responses:
        "200":
          description: Dates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GtInvestDate" }
    post:
      operationId: createGtInvestDate
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateGtInvestDateInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GtInvestDate" }
  /settings/gt-invest-dates/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    delete:
      operationId: deleteGtInvestDate
      tags: [settings]
      responses:
        "204": { description: Deleted }
  /gt-invest/dates/{id}/notify:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    post:
      operationId: notifyGtInvestMeeting
      tags: [gt-invest]
      summary: Email the GT Invest pack to recipients and mark this meeting prepared
      description: |
        Builds the merged GT Invest PDF for the workflows currently
        assigned to this meeting date, emails it to the recipients
        configured in Settings, and stamps the meeting plus each
        included workflow with the current timestamp. Workflows
        joined to the meeting *after* this call will appear without
        the "GT Invest prepared" stamp until the operator re-notifies.
      responses:
        "200":
          description: Notification sent (or skipped if SMTP disabled) and timestamps updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyGtInvestMeetingResult"
  /settings/gt-invest-results:
    get:
      operationId: listGtInvestResults
      tags: [settings]
      responses:
        "200":
          description: Results
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GtInvestResult" }
    post:
      operationId: createGtInvestResult
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateGtInvestResultInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GtInvestResult" }
  /settings/gt-invest-results/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    delete:
      operationId: deleteGtInvestResult
      tags: [settings]
      responses:
        "204": { description: Deleted }

  # ---------------- ADMIN / TRASH ----------------
  /admin/deleted-workflows:
    get:
      operationId: listDeletedWorkflows
      tags: [admin]
      summary: List soft-deleted workflows (admin only)
      responses:
        "200":
          description: Trash listing
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DeletedWorkflow" }

  # ---------------- ADMIN / LDAP TEST ----------------
  /admin/ldap-test:
    post:
      operationId: testLdap
      tags: [admin]
      summary: Validate LDAP / AD configuration
      description: |
        Runs a real LDAP search (and optional user bind) against the
        currently saved LDAP settings so the operator can confirm
        connectivity, credentials, and the AD group → role/department
        mapping before relying on it for sign-in. Admin-only.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LdapTestInput" }
      responses:
        "200":
          description: Test result (ok or error explained in body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LdapTestResult" }

  /admin/smtp-test:
    post:
      operationId: testSmtp
      tags: [admin]
      summary: Send a test email using the current SMTP settings
      description: |
        Sends a one-off test message to the supplied recipient using
        either the values in the request body (so admins can validate
        a config *before* saving it) or, when fields are omitted, the
        currently saved SMTP settings. The saved password is reused
        whenever the body omits one. Admin-only.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SmtpTestInput" }
      responses:
        "200":
          description: Result of the send attempt
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SmtpTestResult" }

  /admin/ldap-sync-roles:
    post:
      operationId: syncLdapRoles
      tags: [admin]
      summary: Re-derive roles + departments from AD groups for every LDAP user
      description: |
        Iterates every user with `source=LDAP`, queries the directory for
        their current group memberships, and re-applies the configured
        Group → Role and Group → Department mappings. Use this after
        changing AD group membership (e.g. assigning a new user to the
        GT Invest notifications group) so the change is reflected
        immediately instead of waiting for the user to log in again.
        Admin-only.
      responses:
        "200":
          description: Sync result summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LdapSyncRolesResult" }

  # ---------------- ADMIN / TLS ----------------
  /admin/csr:
    post:
      operationId: generateCsr
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CsrRequest" }
      responses:
        "200":
          description: CSR
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CsrResponse" }
  /admin/cert:
    get:
      operationId: getCertInfo
      tags: [admin]
      responses:
        "200":
          description: Cert info
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CertInfo" }
    post:
      operationId: importCert
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportCertInput" }
      responses:
        "200":
          description: Imported
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CertInfo" }
  /admin/cert/reload:
    post:
      operationId: reloadCert
      tags: [admin]
      summary: Hot-reload TLS material without restarting the process
      description: |
        Tears down and rebinds the HTTPS listener (and the HTTP→HTTPS
        redirector) using the freshly imported cert + key. Returns the
        new certificate metadata that is now serving traffic.
      responses:
        "200":
          description: Reloaded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CertInfo" }
        "503":
          description: HTTPS listener could not be rebound.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /admin/archive-attachments:
    post:
      operationId: archiveAttachments
      tags: [admin]
      summary: Delete attachments for workflows older than N days
      description: |
        Frees disk space by removing every uploaded document (and its
        version history) attached to workflows whose `created_at` is
        older than the supplied cutoff. The workflow rows themselves —
        and all of their notes, history, audit entries, GT Invest
        decisions, etc. — are left untouched, so the audit trail and
        operational data remain intact.

        Pass `dryRun: true` to compute and return the stats that
        *would* be freed without touching the database. A real run
        deletes inside a transaction and writes one summary
        `audit_log` entry plus a per-workflow `history` row with
        action `ARCHIVE_ATTACHMENTS` so the workflow detail page
        explains why its document grid is now empty.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ArchiveAttachmentsInput" }
      responses:
        "200":
          description: Archive run result (or dry-run preview)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArchiveAttachmentsResult" }
        "400":
          description: Invalid input.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ApiError:
      type: object
      properties:
        error: { type: string }
      required: [error]

    Role:
      type: string
      enum:
        - ADMIN
        - FINANCIAL_ALL
        - FINANCIAL_INVOICE
        - FINANCIAL_PAYMENT
        - DEPT_MANAGER
        - DEPT_USER
        - GT_INVEST
        - GT_INVEST_NOTIFICATIONS
        - READ_ONLY_DEPT
        - READ_ONLY_ALL

    WorkflowStep:
      type: string
      enum:
        - NEW
        - QUOTATION
        - VALIDATING_QUOTE_FINANCIAL
        - VALIDATING_BY_FINANCIAL
        - GT_INVEST
        - ORDERING
        - DELIVERY
        - INVOICE
        - VALIDATING_INVOICE
        - PAYMENT
        - DONE
        - REJECTED

    Priority:
      type: string
      enum: [LOW, NORMAL, HIGH, URGENT]

    Branch:
      type: string
      enum: [K_ORDER, GT_INVEST]

    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        displayName: { type: string }
        email: { type: ["string", "null"] }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        departmentIds:
          type: array
          items: { type: integer }
        source: { type: string, enum: [LOCAL, LDAP] }
        createdAt: { type: string, format: date-time }
      required: [id, username, displayName, roles, departmentIds, source, createdAt]

    CreateUserInput:
      type: object
      properties:
        username: { type: string }
        displayName: { type: string }
        email: { type: ["string", "null"] }
        password: { type: ["string", "null"] }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        departmentIds:
          type: array
          items: { type: integer }
      required: [username, displayName, roles, departmentIds]

    UpdateUserInput:
      type: object
      properties:
        displayName: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        password: { type: ["string", "null"] }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        departmentIds:
          type: array
          items: { type: integer }

    Department:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        adGroupName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, name, code, createdAt]

    CreateDepartmentInput:
      type: object
      properties:
        name: { type: string }
        code: { type: string }
        adGroupName: { type: ["string", "null"] }
      required: [name, code]

    Company:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        address: { type: ["string", "null"] }
        taxId: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, name, createdAt]

    CompanyWithContacts:
      allOf:
        - $ref: "#/components/schemas/Company"
        - type: object
          properties:
            contacts:
              type: array
              items: { $ref: "#/components/schemas/Contact" }
          required: [contacts]

    CreateCompanyInput:
      type: object
      properties:
        name: { type: string }
        address: { type: ["string", "null"] }
        taxId: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
      required: [name]

    Contact:
      type: object
      properties:
        id: { type: integer }
        companyId: { type: integer }
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        role: { type: ["string", "null"] }
      required: [id, companyId, name]

    CreateContactInput:
      type: object
      properties:
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        role: { type: ["string", "null"] }
      required: [name]

    QuoteEntry:
      type: object
      properties:
        companyId: { type: ["integer", "null"] }
        companyName: { type: ["string", "null"] }
        contactId: { type: ["integer", "null"] }
        amount: { type: ["number", "null"] }
        currency: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        winning: { type: boolean }
        # Optional: ids of documents (kind=QUOTE) attached to this
        # specific quote line. Documents themselves live in the
        # workflow's documents collection; this is just the linkage.
        documentIds:
          type: array
          items: { type: integer }
      required: [winning]

    Workflow:
      type: object
      properties:
        id: { type: integer }
        reference: { type: string }
        title: { type: string }
        departmentId: { type: integer }
        departmentName: { type: string }
        createdById: { type: integer }
        createdByName: { type: string }
        priority: { $ref: "#/components/schemas/Priority" }
        currentStep: { $ref: "#/components/schemas/WorkflowStep" }
        branch: { type: ["string", "null"], enum: [K_ORDER, GT_INVEST, null] }
        ageDays: { type: integer }
        isStalled: { type: boolean }
        # Step 1 - New
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        estimatedAmount: { type: ["number", "null"] }
        currency: { type: ["string", "null"] }
        neededBy: { type: ["string", "null"], format: date }
        # Investment request questionnaire (GT Invest form)
        investmentForm:
          oneOf:
            - $ref: "#/components/schemas/InvestmentForm"
            - type: "null"
        # Step 2 - Quotation
        quotes:
          type: array
          items: { $ref: "#/components/schemas/QuoteEntry" }
        threeQuoteRequired: { type: boolean }
        publicationTier:
          type: ["string", "null"]
          enum: [STANDARD, THREE_QUOTES, LIVRE_I, LIVRE_II, null]
          description: |
            Derived from the first quote amount vs the three configured
            thresholds. STANDARD = no extra constraint; THREE_QUOTES =
            three suppliers with a winning pick required; LIVRE_I /
            LIVRE_II = same advance rules as THREE_QUOTES but flagged
            for "Livre I" / "Livre II" publication.
        # Step 3 - Manager validation
        managerApproved: { type: ["boolean", "null"] }
        managerComment: { type: ["string", "null"] }
        # Step 4 - Financial validation
        financialApproved: { type: ["boolean", "null"] }
        financialComment: { type: ["string", "null"] }
        # GT Invest
        gtInvestDateId: { type: ["integer", "null"] }
        gtInvestResultId: { type: ["integer", "null"] }
        gtInvestDecision:
          $ref: "#/components/schemas/GtInvestDecision"
        gtInvestComment: { type: ["string", "null"] }
        # Step 5 - Ordering
        orderNumber: { type: ["string", "null"] }
        orderDate: { type: ["string", "null"], format: date }
        # Step 6 - Delivery
        deliveredOn: { type: ["string", "null"], format: date }
        deliveryNotes: { type: ["string", "null"] }
        # Step 7 - Invoice
        invoiceNumber: { type: ["string", "null"] }
        invoiceAmount: { type: ["number", "null"] }
        invoiceDate: { type: ["string", "null"], format: date }
        # Step 8 - Validating Invoice
        invoiceValidated: { type: ["boolean", "null"] }
        invoiceSignedBy: { type: ["string", "null"] }
        invoiceSignedAt: { type: ["string", "null"], format: date-time }
        # Step 9 - Payment
        paymentDate: { type: ["string", "null"], format: date }
        paymentReference: { type: ["string", "null"] }
        previousStep: { $ref: "#/components/schemas/WorkflowStep" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - reference
        - title
        - departmentId
        - departmentName
        - createdById
        - createdByName
        - priority
        - currentStep
        - ageDays
        - isStalled
        - quotes
        - threeQuoteRequired
        - createdAt
        - updatedAt

    WorkflowSummary:
      type: object
      properties:
        id: { type: integer }
        reference: { type: string }
        title: { type: string }
        departmentId: { type: integer }
        departmentName: { type: string }
        priority: { $ref: "#/components/schemas/Priority" }
        currentStep: { $ref: "#/components/schemas/WorkflowStep" }
        branch: { type: ["string", "null"], enum: [K_ORDER, GT_INVEST, null] }
        estimatedAmount: { type: ["number", "null"] }
        currency: { type: ["string", "null"] }
        ageDays: { type: integer }
        isStalled: { type: boolean }
        createdByName: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        gtInvestDateId: { type: ["integer", "null"] }
        gtInvestPreparedAt: { type: ["string", "null"], format: date-time }
      required:
        - id
        - reference
        - title
        - departmentId
        - departmentName
        - priority
        - currentStep
        - ageDays
        - isStalled
        - createdByName
        - createdAt
        - updatedAt

    DeletedWorkflow:
      type: object
      properties:
        id: { type: integer }
        reference: { type: string }
        title: { type: string }
        departmentId: { type: integer }
        departmentName: { type: string }
        currentStep: { $ref: "#/components/schemas/WorkflowStep" }
        deletedAt: { type: string, format: date-time }
        deletedByName: { type: string }
      required:
        - id
        - reference
        - title
        - departmentId
        - departmentName
        - currentStep
        - deletedAt
        - deletedByName

    WorkflowsByStepGroup:
      type: object
      properties:
        step: { $ref: "#/components/schemas/WorkflowStep" }
        workflows:
          type: array
          items: { $ref: "#/components/schemas/WorkflowSummary" }
      required: [step, workflows]

    CreateWorkflowInput:
      type: object
      properties:
        title: { type: string }
        departmentId: { type: integer }
        priority: { $ref: "#/components/schemas/Priority" }
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        estimatedAmount: { type: ["number", "null"] }
        currency: { type: ["string", "null"] }
        neededBy: { type: ["string", "null"], format: date }
        investmentForm: { $ref: "#/components/schemas/InvestmentForm" }
      required: [title, departmentId, priority]

    UpdateWorkflowInput:
      type: object
      properties:
        title: { type: ["string", "null"] }
        priority: { $ref: "#/components/schemas/Priority" }
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        estimatedAmount: { type: ["number", "null"] }
        currency: { type: ["string", "null"] }
        neededBy: { type: ["string", "null"], format: date }
        investmentForm: { $ref: "#/components/schemas/InvestmentForm" }
        quotes:
          type: array
          items: { $ref: "#/components/schemas/QuoteEntry" }
        managerApproved: { type: ["boolean", "null"] }
        managerComment: { type: ["string", "null"] }
        financialApproved: { type: ["boolean", "null"] }
        financialComment: { type: ["string", "null"] }
        gtInvestDateId: { type: ["integer", "null"] }
        gtInvestResultId: { type: ["integer", "null"] }
        gtInvestComment: { type: ["string", "null"] }
        orderNumber: { type: ["string", "null"] }
        orderDate: { type: ["string", "null"], format: date }
        deliveredOn: { type: ["string", "null"], format: date }
        deliveryNotes: { type: ["string", "null"] }
        invoiceNumber: { type: ["string", "null"] }
        invoiceAmount: { type: ["number", "null"] }
        invoiceDate: { type: ["string", "null"], format: date }
        invoiceValidated: { type: ["boolean", "null"] }
        invoiceSignedBy: { type: ["string", "null"] }
        paymentDate: { type: ["string", "null"], format: date }
        paymentReference: { type: ["string", "null"] }

    AdvanceWorkflowInput:
      type: object
      properties:
        branch: { type: ["string", "null"], enum: [K_ORDER, GT_INVEST, null] }

    GtInvestDecision:
      type: ["string", "null"]
      enum: [OK, REFUSED, POSTPONED, ACCORD_PRINCIPE, null]
      description: |
        Outcome recorded by the GT Invest committee for a workflow:
        OK → moves to Ordering;
        REFUSED → closes the workflow;
        POSTPONED / ACCORD_PRINCIPE → re-queues for the chosen meeting date.

    GtInvestDecisionInput:
      type: object
      properties:
        decision:
          type: string
          enum: [OK, REFUSED, POSTPONED, ACCORD_PRINCIPE]
        dateId:
          type: ["integer", "null"]
          description: Required when decision is POSTPONED or ACCORD_PRINCIPE.
        comment: { type: ["string", "null"] }
      required: [decision]

    RejectWorkflowInput:
      type: object
      properties:
        comment: { type: ["string", "null"] }

    Document:
      type: object
      properties:
        id: { type: integer }
        workflowId: { type: integer }
        step: { $ref: "#/components/schemas/WorkflowStep" }
        filename: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        kind: { type: string, enum: [QUOTE, ORDER, DELIVERY, INVOICE, OTHER, GT_INVEST_WINNER] }
        version: { type: integer }
        previousVersionId: { type: ["integer", "null"] }
        dataUrl: { type: string }
        uploadedById: { type: integer }
        uploadedByName: { type: string }
        uploadedAt: { type: string, format: date-time }
      required:
        - id
        - workflowId
        - step
        - filename
        - mimeType
        - sizeBytes
        - kind
        - version
        - dataUrl
        - uploadedById
        - uploadedByName
        - uploadedAt

    UploadDocumentInput:
      type: object
      properties:
        step: { $ref: "#/components/schemas/WorkflowStep" }
        filename: { type: string }
        mimeType: { type: string }
        kind: { type: string, enum: [QUOTE, ORDER, DELIVERY, INVOICE, OTHER, GT_INVEST_WINNER] }
        contentBase64: { type: string }
        replacesDocumentId: { type: ["integer", "null"] }
      required: [step, filename, mimeType, kind, contentBase64]

    Note:
      type: object
      properties:
        id: { type: integer }
        workflowId: { type: integer }
        step: { $ref: "#/components/schemas/WorkflowStep" }
        body: { type: string }
        authorId: { type: integer }
        authorName: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, workflowId, step, body, authorId, authorName, createdAt]

    CreateNoteInput:
      type: object
      properties:
        step: { $ref: "#/components/schemas/WorkflowStep" }
        body: { type: string }
      required: [step, body]

    HistoryEntry:
      type: object
      properties:
        id: { type: integer }
        workflowId: { type: integer }
        action: { type: string }
        fromStep: { type: ["string", "null"] }
        toStep: { type: ["string", "null"] }
        actorId: { type: integer }
        actorName: { type: string }
        details: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, workflowId, action, actorId, actorName, createdAt]

    StepCount:
      type: object
      properties:
        step: { $ref: "#/components/schemas/WorkflowStep" }
        count: { type: integer }
      required: [step, count]

    DashboardSummary:
      type: object
      properties:
        totalActive: { type: integer }
        totalDone: { type: integer }
        stalledCount: { type: integer }
        averageAgeDays: { type: number }
        countsByStep:
          type: array
          items: { $ref: "#/components/schemas/StepCount" }
        recent:
          type: array
          items: { $ref: "#/components/schemas/HistoryEntry" }
      required: [totalActive, totalDone, stalledCount, averageAgeDays, countsByStep, recent]

    AuditEntry:
      type: object
      properties:
        id: { type: integer }
        actorId: { type: ["integer", "null"] }
        actorName: { type: ["string", "null"] }
        action: { type: string }
        target: { type: ["string", "null"] }
        targetId: { type: ["integer", "null"] }
        ip: { type: ["string", "null"] }
        details: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, action, createdAt]

    LoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
        useLdap: { type: ["boolean", "null"] }
      required: [username, password]

    SessionUser:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        displayName: { type: string }
        email: { type: ["string", "null"] }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        departmentIds:
          type: array
          items: { type: integer }
        source: { type: string, enum: [LOCAL, LDAP, KERBEROS] }
      required: [id, username, displayName, roles, departmentIds, source]

    SessionResponse:
      type: object
      properties:
        authenticated: { type: boolean }
        user: { type: ["object", "null"], $ref: "#/components/schemas/SessionUser" }
      required: [authenticated]

    LdapsSettings:
      type: object
      properties:
        enabled: { type: boolean }
        host: { type: ["string", "null"] }
        port: { type: ["integer", "null"] }
        encryption:
          type: string
          enum: [ldaps, starttls, plain]
          description: |
            Transport security: `ldaps` (implicit TLS, default port 636),
            `starttls` (plain connect on 389 then upgrade), or `plain`
            (no encryption — diagnostic only).
        directoryType:
          type: string
          enum: [ad, generic]
          description: |
            `ad` for Microsoft Active Directory (sAMAccountName,
            displayName, mail, memberOf); `generic` for RFC 4519
            directories like OpenLDAP. Drives the default user filter
            and attribute names.
        baseDn: { type: ["string", "null"] }
        bindDn: { type: ["string", "null"] }
        bindPasswordSet: { type: boolean }
        skipVerify: { type: boolean }
        caCertSet: { type: boolean }
        userFilter: { type: ["string", "null"] }
        usernameAttribute: { type: ["string", "null"] }
        displayNameAttribute: { type: ["string", "null"] }
        emailAttribute: { type: ["string", "null"] }
        groupMembershipAttribute: { type: ["string", "null"] }
        kerberosEnabled: { type: boolean }
        servicePrincipalName: { type: ["string", "null"] }
        groupRoleMap:
          type: object
          additionalProperties: { type: string }
        groupDepartmentMap:
          type: object
          additionalProperties: { type: string }
      required: [enabled, encryption, directoryType, bindPasswordSet, skipVerify, caCertSet, kerberosEnabled]

    SmtpSettings:
      type: object
      properties:
        enabled: { type: boolean }
        host: { type: ["string", "null"] }
        port: { type: ["integer", "null"] }
        username: { type: ["string", "null"] }
        passwordSet: { type: boolean }
        secure: { type: boolean }
        fromAddress: { type: ["string", "null"] }
      required: [enabled, passwordSet, secure]

    ArchiveAttachmentsInput:
      type: object
      properties:
        olderThanDays:
          type: integer
          minimum: 1
          description: |
            Workflows whose `created_at` is strictly older than `now - olderThanDays`
            will have all of their attachments + version history removed.
        dryRun:
          type: boolean
          default: false
          description: |
            When `true`, no rows are deleted — the response only reports
            what *would* be removed.
      required: [olderThanDays]

    ArchiveAttachmentsResult:
      type: object
      properties:
        dryRun: { type: boolean }
        cutoffIso:
          type: string
          format: date-time
          description: ISO 8601 cutoff timestamp the server actually used.
        workflowsAffected:
          type: integer
          description: Number of workflows that had at least one attachment removed (or would have, in a dry run).
        documentsRemoved: { type: integer }
        versionsRemoved: { type: integer }
        bytesFreed:
          type: integer
          description: Sum of `size_bytes` across every removed document and version.
      required:
        - dryRun
        - cutoffIso
        - workflowsAffected
        - documentsRemoved
        - versionsRemoved
        - bytesFreed

    AppSettings:
      type: object
      properties:
        appName: { type: string }
        logoDataUrl: { type: ["string", "null"] }
        limitX: { type: number }
        quoteThresholdStandard: { type: number }
        quoteThresholdLivreI: { type: number }
        quoteThresholdLivreII: { type: number }
        currency: { type: string }
        certSigningEnabled: { type: boolean }
        signingAgentPort: { type: ["integer", "null"] }
        # Default retention period (in days) used to pre-populate the
        # Settings → Archive form. The actual archive run takes its
        # cutoff from the request body, so this is a UX-only default.
        archiveRetentionDays: { type: ["integer", "null"] }
        gtInvestRecipients:
          type: array
          items: { type: string }
        ldap: { $ref: "#/components/schemas/LdapsSettings" }
        smtp: { $ref: "#/components/schemas/SmtpSettings" }
      required:
        - appName
        - limitX
        - currency
        - certSigningEnabled
        - gtInvestRecipients
        - ldap
        - smtp

    UpdateSettingsInput:
      type: object
      properties:
        appName: { type: ["string", "null"] }
        logoDataUrl: { type: ["string", "null"] }
        limitX: { type: ["number", "null"] }
        quoteThresholdStandard: { type: ["number", "null"] }
        quoteThresholdLivreI: { type: ["number", "null"] }
        quoteThresholdLivreII: { type: ["number", "null"] }
        currency: { type: ["string", "null"] }
        certSigningEnabled: { type: ["boolean", "null"] }
        signingAgentPort: { type: ["integer", "null"] }
        archiveRetentionDays: { type: ["integer", "null"] }
        gtInvestRecipients:
          type: array
          items: { type: string }
        ldap:
          type: object
          properties:
            enabled: { type: ["boolean", "null"] }
            host: { type: ["string", "null"] }
            port: { type: ["integer", "null"] }
            encryption:
              type: ["string", "null"]
              enum: [ldaps, starttls, plain, null]
            directoryType:
              type: ["string", "null"]
              enum: [ad, generic, null]
            baseDn: { type: ["string", "null"] }
            bindDn: { type: ["string", "null"] }
            bindPassword: { type: ["string", "null"] }
            skipVerify: { type: ["boolean", "null"] }
            caCert: { type: ["string", "null"] }
            userFilter: { type: ["string", "null"] }
            usernameAttribute: { type: ["string", "null"] }
            displayNameAttribute: { type: ["string", "null"] }
            emailAttribute: { type: ["string", "null"] }
            groupMembershipAttribute: { type: ["string", "null"] }
            kerberosEnabled: { type: ["boolean", "null"] }
            servicePrincipalName: { type: ["string", "null"] }
            groupRoleMap:
              type: object
              additionalProperties: { type: string }
            groupDepartmentMap:
              type: object
              additionalProperties: { type: string }
        smtp:
          type: object
          properties:
            enabled: { type: ["boolean", "null"] }
            host: { type: ["string", "null"] }
            port: { type: ["integer", "null"] }
            username: { type: ["string", "null"] }
            password: { type: ["string", "null"] }
            secure: { type: ["boolean", "null"] }
            fromAddress: { type: ["string", "null"] }

    GtInvestDate:
      type: object
      properties:
        id: { type: integer }
        date: { type: string, format: date }
        label: { type: ["string", "null"] }
        preparedAt: { type: ["string", "null"], format: date-time }
        preparedByName: { type: ["string", "null"] }
      required: [id, date]

    SmtpTestInput:
      type: object
      properties:
        to: { type: string, format: email, description: Recipient email address }
        host: { type: ["string", "null"] }
        port: { type: ["integer", "null"] }
        secure: { type: ["boolean", "null"] }
        username: { type: ["string", "null"] }
        password: { type: ["string", "null"], description: "Optional. When omitted, the saved password is reused." }
        fromAddress: { type: ["string", "null"] }
      required: [to]

    SmtpTestResult:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: ["string", "null"] }
      required: [ok]

    LdapSyncRolesResult:
      type: object
      properties:
        ok: { type: boolean }
        scanned: { type: integer, description: Number of LDAP users iterated }
        updated: { type: integer, description: Number of users whose roles or departments changed }
        skipped: { type: integer, description: Number of users skipped (no AD groups returned, mapping disabled, etc.) }
        errors:
          type: array
          items:
            type: object
            properties:
              username: { type: string }
              error: { type: string }
            required: [username, error]
        message: { type: ["string", "null"] }
      required: [ok, scanned, updated, skipped, errors]

    NotifyGtInvestMeetingResult:
      type: object
      properties:
        sent: { type: boolean }
        recipients:
          type: array
          items: { type: string }
        workflowCount: { type: integer }
        preparedAt: { type: string, format: date-time }
      required: [sent, recipients, workflowCount, preparedAt]

    CreateGtInvestDateInput:
      type: object
      properties:
        date: { type: string, format: date }
        label: { type: ["string", "null"] }
      required: [date]

    GtInvestResult:
      type: object
      properties:
        id: { type: integer }
        label: { type: string }
      required: [id, label]

    CreateGtInvestResultInput:
      type: object
      properties:
        label: { type: string }
      required: [label]

    CsrRequest:
      type: object
      properties:
        commonName: { type: string }
        organization: { type: ["string", "null"] }
        organizationalUnit: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        locality: { type: ["string", "null"] }
        sans:
          type: array
          items: { type: string }
      required: [commonName]

    CsrResponse:
      type: object
      properties:
        csrPem: { type: string }
      required: [csrPem]

    CertInfo:
      type: object
      properties:
        present: { type: boolean }
        subject: { type: ["string", "null"] }
        issuer: { type: ["string", "null"] }
        validFrom: { type: ["string", "null"], format: date-time }
        validTo: { type: ["string", "null"], format: date-time }
        sans:
          type: array
          items: { type: string }
        fingerprint: { type: ["string", "null"] }
      required: [present, sans]

    ImportCertInput:
      type: object
      properties:
        certPem: { type: string }
        chainPem: { type: ["string", "null"] }
      required: [certPem]

    LdapTestInput:
      type: object
      description: |
        Optional username/password to fully exercise the user-bind path.
        When omitted, the test only validates the bind-DN credentials and
        the search/CA chain — useful when the operator wants to confirm
        the server is reachable without typing a real user password.
      properties:
        username: { type: ["string", "null"] }
        password: { type: ["string", "null"] }

    LdapTestResult:
      type: object
      properties:
        ok: { type: boolean }
        stage:
          type: string
          description: Which phase of the test the outcome reports on
          enum: [bind, search, user_bind, mapping, complete]
        error: { type: ["string", "null"] }
        displayName: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        groups:
          type: array
          items: { type: string }
        derivedRoles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        derivedDepartmentCodes:
          type: array
          items: { type: string }
        steps:
          type: array
          description: |
            Step-by-step trace of the diagnostic so the operator can see
            exactly which phase failed and the raw error message.
          items: { $ref: "#/components/schemas/LdapDiagnosticStep" }
      required: [ok, stage, groups, derivedRoles, derivedDepartmentCodes, steps]

    LdapDiagnosticStep:
      type: object
      properties:
        name: { type: string }
        status:
          type: string
          enum: [ok, fail, skip]
        detail: { type: ["string", "null"] }
        durationMs: { type: ["integer", "null"] }
      required: [name, status]

    InvestmentForm:
      type: object
      description: |
        GT Invest investment request questionnaire (FORMULAIRE DE DEMANDE
        D'INVESTISSEMENT). All fields optional — the form may be filled
        incrementally. Stored as JSONB on the workflow row.
      properties:
        # 1 – Identification
        projectLeader: { type: ["string", "null"] }
        investmentTypes:
          type: array
          items: { type: string }
        # 2 – Description du besoin
        justification: { type: ["string", "null"] }
        demoTested: { type: ["boolean", "null"] }
        demoContext: { type: ["string", "null"] }
        # 3 – Nature de la demande
        requestNature: { type: ["string", "null"] }
        replacedEquipmentRef: { type: ["string", "null"] }
        replacedEquipmentLocation: { type: ["string", "null"] }
        replacementReason: { type: ["string", "null"] }
        decommissioned: { type: ["boolean", "null"] }
        decommissionedNote: { type: ["string", "null"] }
        # 4 – Aspects financiers
        estimatedAmount5y: { type: ["number", "null"] }
        exceptionProcedure: { type: ["string", "null"] }
        exceptionJustification: { type: ["string", "null"] }
        budgetPositionKnown: { type: ["string", "null"] }
        budgetPosition: { type: ["string", "null"] }
        # 5 – Fournisseur
        supplierName: { type: ["string", "null"] }
        supplierContact: { type: ["string", "null"] }
        # 6 – Aspects techniques
        architecturalWorks: { type: ["boolean", "null"] }
        itConnection: { type: ["boolean", "null"] }
        systemInterop: { type: ["boolean", "null"] }
        accessTypes:
          type: array
          items: { type: string }
        # 7 – Données, sécurité et conformité
        dataTypes:
          type: array
          items: { type: string }
        availabilityImpact: { type: ["string", "null"] }
        hasAI: { type: ["boolean", "null"] }
        # 8 – Consommables et sécurité
        consumablesNeeded: { type: ["boolean", "null"] }
        consumablesOfferAttached: { type: ["boolean", "null"] }
        hazardousConsumables: { type: ["boolean", "null"] }
        # 9 – Maintenance, hygiène et exploitation
        warrantyDuration: { type: ["string", "null"] }
        maintenanceContract: { type: ["boolean", "null"] }
        cleaningRequired: { type: ["boolean", "null"] }
        sterilizationRequired: { type: ["boolean", "null"] }
        # 10 – Formation et mise en service
        trainingRequired: { type: ["boolean", "null"] }
        trainingOfferAttached: { type: ["boolean", "null"] }
        commissioningDate: { type: ["string", "null"] }
        # 11 – Documentation obligatoire
        documentsProvided:
          type: array
          items: { type: string }

    NotificationEntry:
      type: object
      properties:
        id: { type: integer }
        workflowId: { type: integer }
        step: { type: string }
        channel: { type: string }
        recipients:
          type: array
          items: { type: string }
        subject: { type: string }
        body: { type: string }
        status: { type: string, enum: [PENDING, SENT, FAILED] }
        error: { type: ["string", "null"] }
        sentAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - workflowId
        - step
        - channel
        - recipients
        - subject
        - body
        - status
        - createdAt
